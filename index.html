<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Banderas</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>">
    
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
 
<div id="screen-home">
    <div class="home-content">
        <h1 class="home-title">Juego de Banderas</h1>
        <p class="home-subtitle">Pon a prueba tu conocimiento geográfico</p>
        
        <div class="mode-container">
            <button class="mode-card" id="btn-mode-paises">
                <div class="mode-card-text">
                    <div class="mode-card-title">Adivina el País</div>
                    <div class="mode-card-desc">Solo necesitas el nombre</div>
                </div>
            </button>
            
            <button class="mode-card" id="btn-mode-capitales">
                <div class="mode-card-text">
                    <div class="mode-card-title">País y Capital</div>
                    <div class="mode-card-desc">El desafío completo</div>
                </div>
            </button>
            
            <button class="mode-card" id="btn-show-ranking" style="margin-top: 1rem; border-color: var(--accent-gold);">
                <div class="mode-card-text">
                    <div class="mode-card-title" style="color: var(--accent-gold);">Ranking</div>
                    <div class="mode-card-desc">Estadísticas Históricas</div>
                </div>
            </button>
        </div>
    </div>
</div>
 
<div id="screen-game" class="hidden">
    <div class="game-container">
        <div class="game-header">
            <button class="back-btn" id="btn-home-back">
                Inicio
            </button>
            <div class="timer" id="game-timer">00:00</div>
            <div class="game-mode-label" id="mode-label">Países</div>
        </div>
        
        <div class="score-grid">
            <div class="metric"><div class="metric-val" id="score-correct">0</div><div class="metric-lbl">Correctas</div></div>
            <div class="metric"><div class="metric-val" id="score-wrong">0</div><div class="metric-lbl">Errores</div></div>
            <div class="metric"><div class="metric-val" id="score-total">0</div><div class="metric-lbl">Total</div></div>
        </div>
        
        <div class="game-card">
            <div class="flag-wrapper">
                <img src="" id="flag-img" alt="Bandera" />
            </div>
            
            <div class="progress-container"><div class="progress-bar" id="progress-fill" style="width:0%"></div></div>
            
            <div id="feedback-box" class="feedback hidden"></div>
            
            <div class="input-area">
                <div class="input-group">
                    <label>¿Qué país es?</label>
                    <input type="text" id="input-pais" placeholder="Escribe el país..." autocomplete="off" />
                </div>
                <div class="input-group hidden" id="row-capital">
                    <label>Capital</label>
                    <input type="text" id="input-capital" placeholder="Escribe la capital..." autocomplete="off" />
                </div>
            </div>
            
            <div class="actions-area">
                <button class="btn-icon btn-cancel" id="btn-skip" title="No la sé">
                    <span class="icon">✕</span>
                </button>
                <button class="btn-icon btn-confirm" id="btn-check" title="Confirmar">
                    <span class="icon">✓</span>
                </button>
            </div>
        </div>
    </div>
</div>
 
<div id="screen-stats" class="hidden">
    <div class="stats-container">
        <h1 class="stats-title" id="stats-main-title">Resultados</h1>
        <div id="stats-global" class="stats-global-card"></div>
        <div id="stats-ranking" class="ranking-card"></div>
        <div id="stats-regions" class="stats-regions"></div>
        <div id="stats-capitals" class="region-card hidden"></div>
        <div class="stats-actions" style="display: flex; gap: 1rem;">
            <button class="btn-play-again" style="background: var(--glass-bg); color: white; border: 1px solid var(--glass-border);" onclick="location.reload()">Inicio</button>
            <button class="btn-play-again" id="btn-restart" style="flex: 2;">Jugar de nuevo</button>
        </div>
    </div>
</div>
 
<script type="module" src="js/app.js"></script>

<div id="modal-confirm" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 class="modal-title">¿Abandonar partida?</h2>
        <p class="modal-text">Si vuelves al inicio perderás el progreso actual.</p>
        <div class="modal-actions">
            <button class="btn-modal btn-modal-cancel" id="btn-modal-cancel">Cancelar</button>
            <button class="btn-modal btn-modal-confirm" id="btn-modal-confirm">Sí, salir</button>
        </div>
    </div>
</div>

<div id="modal-nickname" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 450px;">
        <h2 class="modal-title">¡Bienvenido!</h2>
        <p class="modal-text">Para guardar tus estadísticas, ingresa un nickname o juega de forma anónima.</p>
        
        <div class="input-group" style="margin-bottom: 1.5rem;">
            <input type="text" id="modal-input-nickname" placeholder="Tu nombre..." autocomplete="off" maxlength="15" style="text-align: center; border-color: var(--accent-teal); margin-bottom: 0;"/>
        </div>

        <div class="modal-actions" style="flex-direction: column; gap: 0.75rem;">
            <button class="btn-modal btn-modal-confirm" id="btn-modal-nick-confirm" style="width: 100%; background: var(--success);">Jugar con Nickname</button>
            <button class="btn-modal btn-modal-cancel" id="btn-modal-nick-anon" style="width: 100%; border: none; background: rgba(255,255,255,0.05);">Jugar como Anónimo</button>
        </div>
    </div>
</div>
</body>
</html>
