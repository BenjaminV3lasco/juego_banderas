<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Banderas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<section id="screen-home">
    <div class="home-content">
        <div class="home-badge">250 PAÍSES · API REST COUNTRIES</div>
        <h1 class="home-title">Juego de Banderas</h1>
        <p class="home-subtitle">Pon a prueba tu conocimiento geográfico</p>
        <div class="mode-container">
            <button class="mode-card" id="btn-mode-paises">
                <div class="mode-card-icon">🏳️</div>
                <div class="mode-card-title">Adivina el País</div>
            </button>
            <button class="mode-card" id="btn-mode-capitales">
                <div class="mode-card-icon">🏛️</div>
                <div class="mode-card-title">País y Capital</div>
            </button>
        </div>
    </div>
</section>

<section id="screen-game" class="hidden">
    <div class="game-container">
        <header class="game-header">
            <button class="back-btn" id="btn-home-back">🏠 Inicio</button>
            <div class="game-mode-label" id="mode-label">PAÍSES</div>
        </header>
        <div class="score-grid">
            <div class="metric"><div class="metric-val" id="score-correct">0</div><div class="metric-lbl">Correctas</div></div>
            <div class="metric"><div class="metric-val" id="score-wrong">0</div><div class="metric-lbl">Errores</div></div>
            <div class="metric"><div class="metric-val" id="score-total">0</div><div class="metric-lbl">Total</div></div>
        </div>
        <div class="game-card">
            <div class="flag-wrapper"><img src="" id="flag-img" alt="Bandera" /></div>
            <div class="progress-container"><div class="progress-bar" id="progress-fill"></div></div>
            <div id="feedback-box" class="feedback hidden"></div>
            <div class="input-area">
                <div class="input-group">
                    <label>País</label>
                    <input type="text" id="input-pais" placeholder="..." autocomplete="off" />
                </div>
                <div class="input-group hidden" id="row-capital">
                    <label>Capital</label>
                    <input type="text" id="input-capital" placeholder="..." autocomplete="off" />
                </div>
            </div>
            <div class="actions-area">
                <button class="btn-icon btn-cancel" id="btn-skip">✕</button>
                <button class="btn-icon btn-confirm" id="btn-check">✓</button>
            </div>
        </div>
    </div>
</section>

<section id="screen-stats" class="hidden">
    <div class="game-container">
        <h2 class="home-title">Estadísticas</h2>
        <div id="stats-content" class="stats-scroll-area"></div>
        <button class="btn-main" onclick="location.reload()">Jugar de Nuevo</button>
    </div>
</section>

<script type="module" src="js/app.js"></script>
</body>
</html>
